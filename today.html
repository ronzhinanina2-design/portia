<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Portia — Today</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Instrument+Serif&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #141B24; font-family: Inter, sans-serif; color: #E8EDF2; min-height: 100vh; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: #2A3A4A; border-radius: 4px; }
  input::placeholder { color: #6B7E91; }
  input, button { font-family: Inter, sans-serif; }

  .meal-card { position: relative; }
  .meal-actions { opacity: 0; pointer-events: none; transition: opacity 0.15s; }
  .meal-card:hover .meal-actions { opacity: 1; pointer-events: auto; }
  .meal-card:hover .meal-stats { opacity: 0; pointer-events: none; }
  .meal-stats { transition: opacity 0.15s; }

  .meal-icon { cursor: pointer; color: #8B9BAD; transition: color 0.15s, transform 0.08s; width: 34px; height: 34px; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
  .meal-icon:hover { color: #E8EDF2; }
  .meal-icon:active { color: #E8EDF2; transform: scale(0.9); }

  .empty-slot { background: #1C2733; border: 1.5px dashed #2A3A4A; border-radius: 16px; padding: 18px 20px; display: flex; align-items: center; gap: 16px; cursor: pointer; transition: border-color 0.15s; }
  .empty-slot:hover { border-color: #2ABFAD; }

  .tag-chip { display: inline-flex; align-items: center; padding: 8px 14px; border-radius: 10px; font-size: 13px; font-weight: 500; cursor: pointer; white-space: nowrap; transition: background 0.15s, border-color 0.15s, color 0.15s; background: #2A3A4A; border: 1.5px solid #2A3A4A; color: #8B9BAD; }
  .tag-chip.active { border-color: #2ABFAD; color: #2ABFAD; }
  .tag-chip:hover { background: #233040; }

  .item-row { display: flex; align-items: center; gap: 14px; padding: 12px 8px; margin: 0 -6px; border-radius: 8px; border-bottom: 1px solid rgba(42,58,74,0.5); cursor: pointer; transition: background 0.15s; }
  .item-row:hover { background: #233040; }

  .counter-btn { width: 32px; height: 32px; border-radius: 9px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; border: 1.5px solid #2ABFAD; background: transparent; }
  .counter-btn.selected { background: #2ABFAD; border-color: #2ABFAD; }

  .preset-btn { flex: 1; text-align: center; padding: 9px 0; border-radius: 9px; font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid #34465A; color: #8B9BAD; background: transparent; transition: background 0.15s, border-color 0.15s, color 0.15s; }
  .preset-btn:hover { background: #233040; }
  .preset-btn.active { border-color: #2ABFAD; color: #2ABFAD; background: rgba(42,191,173,0.10); }

  .modal-overlay { position: fixed; inset: 0; background: rgba(10,14,20,0.72); display: flex; align-items: center; justify-content: center; padding: 40px; z-index: 50; }
  .modal-box { width: 100%; max-width: 1000px; height: 660px; max-height: 88vh; background: #1C2733; border: 1px solid #2A3A4A; border-radius: 24px; display: flex; overflow: hidden; box-shadow: 0 30px 80px rgba(0,0,0,0.55); }

  .search-input { width: 100%; background: #2A3A4A; border: 1.5px solid #2A3A4A; border-radius: 12px; padding: 13px 16px 13px 44px; font-size: 15px; color: #E8EDF2; outline: none; transition: border-color 0.15s; }
  .search-input:hover { border-color: #3D5166; }
  .search-input:focus { border-color: #2ABFAD; }

  .custom-g-input { width: 90px; background: #34465A; border: 1.5px solid #455A70; border-radius: 10px; padding: 9px 12px; font-size: 14px; color: #E8EDF2; outline: none; text-align: right; transition: border-color 0.15s; }
  .custom-g-input:hover { border-color: #3D5166; }
  .custom-g-input:focus { border-color: #2ABFAD; }

  .cta-btn { width: 100%; border: none; font-size: 15px; font-weight: 600; padding: 15px; border-radius: 13px; transition: background 0.15s, transform 0.08s; }
  .cta-btn.enabled { background: #E8B800; color: #141B24; cursor: pointer; }
  .cta-btn.enabled:hover { background: #C9A000; }
  .cta-btn.enabled:active { background: #C9A000; transform: scale(0.985); }
  .cta-btn.disabled { background: rgba(232,184,0,0.35); color: rgba(20,27,36,0.35); cursor: not-allowed; }

  .done-btn { border: none; background: #E8B800; color: #141B24; font-size: 15px; font-weight: 600; padding: 14px 26px; border-radius: 13px; cursor: pointer; transition: background 0.15s, transform 0.08s; }
  .done-btn:hover { background: #C9A000; }
  .done-btn:active { background: #C9A000; transform: scale(0.985); }

  .add-meal-row { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 14px; color: #E8B800; font-size: 14px; font-weight: 500; cursor: pointer; transition: color 0.15s; }
  .add-meal-row:hover { color: #C9A000; }

  .close-btn { width: 30px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #8B9BAD; transition: color 0.15s, transform 0.08s; }
  .close-btn:hover { color: #E8EDF2; }
  .close-btn:active { transform: scale(0.9); }

  .back-btn { width: 32px; height: 32px; border-radius: 9px; border: 1px solid #34465A; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #8B9BAD; transition: color 0.15s, transform 0.08s; flex-shrink: 0; }
  .back-btn:hover { color: #E8EDF2; }
  .back-btn:active { transform: scale(0.9); }

  .nav-tab { display: flex; align-items: center; gap: 9px; padding: 9px 16px; border-radius: 10px; color: #8B9BAD; font-size: 14px; font-weight: 500; cursor: pointer; text-decoration: none; transition: background 0.15s, color 0.15s; }
  .nav-tab.active { background: #2A3A4A; color: #E8EDF2; }
  .nav-tab:hover:not(.active) { background: rgba(42,58,74,0.4); }
</style>
</head>
<body>
<div id="app"></div>
<div id="modal-root"></div>

<script>
const LIBRARY = [
  {id:'chicken', name:'Grilled chicken breast', tags:['High protein','Meat'], wholeG:200, kcal:330, protein:62},
  {id:'brownrice', name:'Brown rice', tags:['Grains','Vegetarian'], wholeG:150, kcal:180, protein:4},
  {id:'yogurt', name:'Greek yogurt', tags:['High protein','Dairy'], wholeG:170, kcal:100, protein:17},
  {id:'berries', name:'Mixed berries', tags:['Fruit','Vegetarian'], wholeG:100, kcal:50, protein:1},
  {id:'salmon', name:'Salmon fillet', tags:['High protein','Fish'], wholeG:150, kcal:280, protein:30},
  {id:'avocado', name:'Avocado', tags:['Healthy fats','Vegetarian'], wholeG:100, kcal:160, protein:2},
  {id:'quinoa', name:'Quinoa', tags:['Grains','Vegetarian'], wholeG:150, kcal:220, protein:8},
  {id:'eggs', name:'Boiled eggs', tags:['High protein'], wholeG:100, kcal:140, protein:13},
  {id:'almonds', name:'Almonds', tags:['Healthy fats','Snack'], wholeG:30, kcal:170, protein:6},
  {id:'banana', name:'Banana', tags:['Fruit','Snack'], wholeG:120, kcal:105, protein:1},
  {id:'cottage', name:'Cottage cheese', tags:['High protein','Dairy'], wholeG:150, kcal:130, protein:20},
  {id:'sweetpotato', name:'Sweet potato', tags:['Grains','Vegetarian'], wholeG:150, kcal:130, protein:3},
];
const ALL_TAGS = ['High protein','Vegetarian','Grains','Fruit','Dairy','Snack'];
const RECENTS = ['chicken','brownrice','yogurt'];
const FAVOURITES = ['salmon','avocado','eggs'];
const GOAL_KCAL = 1300, GOAL_PROTEIN = 90;
const SLOTS = ['breakfast','lunch','snack','dinner'];

let state = {
  loggedMeals: {
    breakfast: {names:['Greek yogurt & berries'], kcal:320, protein:24},
    lunch: {names:['Chicken & quinoa bowl'], kcal:640, protein:50},
    snack: null, dinner: null,
  },
  modalSlot: null, step: 1, search: '', activeTags: [], selected: {}, order: [],
};

function setState(patch) {
  const prev = state;
  if (typeof patch === 'function') state = { ...state, ...patch(state) };
  else state = { ...state, ...patch };

  const modalJustOpened = !prev.modalSlot && state.modalSlot;
  const modalJustClosed = prev.modalSlot && !state.modalSlot;
  const modalChanged = prev.step !== state.step || prev.search !== state.search ||
    JSON.stringify(prev.activeTags) !== JSON.stringify(state.activeTags) ||
    JSON.stringify(prev.selected) !== JSON.stringify(state.selected) ||
    JSON.stringify(prev.order) !== JSON.stringify(state.order);
  const mainChanged = JSON.stringify(prev.loggedMeals) !== JSON.stringify(state.loggedMeals) || modalJustOpened || modalJustClosed;

  if (mainChanged) renderMain();
  if (state.modalSlot && (modalJustOpened || modalChanged)) renderModal();
  if (modalJustClosed) renderModal();
}

const fmt = n => n.toLocaleString('en-US');
const itemById = id => LIBRARY.find(i => i.id === id);
function isConfirmed(sel) { if(!sel||!sel.portion) return false; if(sel.portion==='custom') return Number(sel.customG)>0; return true; }
function calc(it,sel) { if(!isConfirmed(sel)) return null; const f=sel.portion==='whole'?1:sel.portion==='half'?0.5:(Number(sel.customG)/it.wholeG); return { kcal:Math.round(it.kcal*f), protein:Math.round(it.protein*f) }; }

function openModal(slot) { setState({ modalSlot:slot, step:1, search:'', activeTags:[], selected:{}, order:[] }); }
function closeModal() { setState({ modalSlot:null }); }
function toggleItem(id) {
  setState(s=>{ const selected={...s.selected}; let order=[...s.order]; if(selected[id]){ delete selected[id]; order=order.filter(x=>x!==id); } else { selected[id]={portion:null,customG:''}; order=[...order,id]; } return { selected, order }; });
}
function toggleTag(t) { setState(s=>({ activeTags: s.activeTags.includes(t)?s.activeTags.filter(x=>x!==t):[...s.activeTags,t] })); }
function setPortion(id,p) {
  const inputEl = document.querySelector(`.custom-g-input[data-id="${id}"]`);
  const customG = inputEl ? inputEl.value : (state.selected[id]||{}).customG||'';
  setState(s=>({ selected:{...s.selected,[id]:{...s.selected[id],portion:p,customG}} }));
}
function setCustomG(id, val) {
  const clean = String(val).replace(/[^0-9]/g,'');
  state = { ...state, selected:{...state.selected,[id]:{...state.selected[id],portion:'custom',customG:clean}} };
  updateSidebarTotals();
}
function gotoStep2() { setState({ step:2 }); }
function gotoStep1() { setState(s=>{ const selected={}; for(const id of s.order) selected[id]={portion:null,customG:''}; return { step:1, selected }; }); }
function deleteMeal(key) { setState(s=>({ loggedMeals:{...s.loggedMeals,[key]:null} })); }
function logMeal() {
  document.querySelectorAll('.custom-g-input').forEach(el => {
    const id=el.dataset.id; if(id&&state.selected[id]) state.selected[id]={...state.selected[id],customG:el.value};
  });
  setState(s=>{
    let names=[],kcal=0,protein=0;
    for(const id of s.order){ const it=itemById(id); const c=calc(it,s.selected[id]); names.push(it.name); kcal+=c.kcal; protein+=c.protein; }
    return { loggedMeals:{...s.loggedMeals,[s.modalSlot]:{names,kcal,protein}}, modalSlot:null };
  });
}

function updateSidebarTotals() {
  const s=state; let totalK=0,totalP=0,allConfirmed=s.order.length>0;
  for(const id of s.order){
    const it=itemById(id);
    const inputEl=document.querySelector(`.custom-g-input[data-id="${id}"]`);
    const sel=inputEl?{...s.selected[id],customG:inputEl.value}:s.selected[id];
    const c=calc(it,sel);
    if(c){ totalK+=c.kcal; totalP+=c.protein; } else { allConfirmed=false; }
    const rowEl=document.querySelector(`.sidebar-item[data-id="${id}"]`);
    if(rowEl){ rowEl.querySelector('.item-kcal').textContent=c?`${fmt(c.kcal)} kcal`:''; rowEl.querySelector('.item-protein').textContent=c?`${c.protein}g protein`:''; rowEl.querySelector('.item-kcal').style.color=c?'#E8EDF2':'#5C6B7A'; }
  }
  const ctaEl=document.getElementById('modal-cta');
  if(document.getElementById('sidebar-total-kcal')) document.getElementById('sidebar-total-kcal').textContent=`${fmt(totalK)} kcal`;
  if(document.getElementById('sidebar-total-protein')) document.getElementById('sidebar-total-protein').textContent=`${totalP}g protein`;
  if(ctaEl){ const label=s.step===1?'Continue':'Log meal'; ctaEl.textContent=label; ctaEl.className=`cta-btn ${allConfirmed?'enabled':'disabled'}`; ctaEl.disabled=!allConfirmed; ctaEl.onclick=allConfirmed?(s.step===1?gotoStep2:logMeal):null; }
}

const iconCalendar=`<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3.5" y="4.5" width="17" height="16" rx="2.5"/><path d="M3.5 9h17M8 2.5v4M16 2.5v4"/></svg>`;
const iconWeek=`<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3.5" y="3.5" width="7" height="7" rx="1.5"/><rect x="13.5" y="3.5" width="7" height="7" rx="1.5"/><rect x="3.5" y="13.5" width="7" height="7" rx="1.5"/><rect x="13.5" y="13.5" width="7" height="7" rx="1.5"/></svg>`;
const iconRecipes=`<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3.5h12v17l-6-4-6 4z"/></svg>`;
const iconProgress=`<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19V5M4 19h16"/><path d="M7 15l3.5-4 3 2.5L20 7"/></svg>`;
const iconStar=`<svg width="16" height="16" viewBox="0 0 24 24" fill="#E8B800" stroke="none"><path d="M12 3l2.6 6.1 6.4.5-4.9 4.2 1.5 6.4L12 16.9 6.9 20.7l1.5-6.4L3.5 9.6l6.4-.5z"/></svg>`;
const iconCheck=`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#2ABFAD" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>`;
const iconPlus=`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>`;
const iconEdit=`<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>`;
const iconTrash=`<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg>`;
const iconSearch=`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#8B9BAD" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>`;
const iconClose=`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>`;
const iconBack=`<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>`;
const iconCheckW=`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>`;
const iconPlusTeal=`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#2ABFAD" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>`;

function renderItemRow(it, isSelected) {
  return `<div class="item-row" onclick="toggleItem('${it.id}')">
    <div style="flex:1;min-width:0;"><div style="font-size:15px;font-weight:500;color:#E8EDF2;">${it.name}</div><div style="font-size:12px;color:#8B9BAD;margin-top:2px;">${it.tags.join(' · ')}</div></div>
    <div style="text-align:right;flex-shrink:0;"><div style="font-size:14px;font-weight:500;color:#E8EDF2;">${it.kcal} kcal</div><div style="font-size:12px;color:#8B9BAD;">${it.protein}g protein</div></div>
    <div class="counter-btn${isSelected?' selected':''}">${isSelected?iconCheckW:iconPlusTeal}</div>
  </div>`;
}

function renderModal() {
  const s=state; const root=document.getElementById('modal-root');
  if(!s.modalSlot){ root.innerHTML=''; return; }

  const slotsMeta=[['breakfast','Breakfast'],['lunch','Lunch'],['snack','Snack'],['dinner','Dinner']];
  const slotLabel=(slotsMeta.find(([k])=>k===s.modalSlot)||[null,''])[1];
  const q=s.search.trim().toLowerCase();
  const matches=it=>(!q||it.name.toLowerCase().includes(q))&&(s.activeTags.length===0||it.tags.some(t=>s.activeTags.includes(t)));
  const showSections=!q&&s.activeTags.length===0;
  const filtered=LIBRARY.filter(matches);
  const tagsHTML=ALL_TAGS.map(t=>`<div class="tag-chip${s.activeTags.includes(t)?' active':''}" onclick="toggleTag('${t}')">${t}</div>`).join('');

  let listHTML='';
  if(showSections){ listHTML=`<div style="font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:#8B9BAD;margin:4px 0 6px;">Recents</div>${RECENTS.map(id=>renderItemRow(itemById(id),!!s.selected[id])).join('')}<div style="font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:#8B9BAD;margin:18px 0 6px;">Favourites</div>${FAVOURITES.map(id=>renderItemRow(itemById(id),!!s.selected[id])).join('')}`; }
  else if(filtered.length>0){ listHTML=filtered.map(it=>renderItemRow(it,!!s.selected[it.id])).join(''); }
  else { listHTML=`<div style="padding:40px 8px;text-align:center;"><div style="font-size:15px;color:#8B9BAD;">Nothing found.</div></div>`; }

  let totalK=0,totalP=0,allConfirmed=s.order.length>0;
  const addedItemsHTML=s.order.map(id=>{ const it=itemById(id); const c=calc(it,s.selected[id]); if(c){ totalK+=c.kcal; totalP+=c.protein; } else { allConfirmed=false; } return `<div class="sidebar-item" data-id="${id}" style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;padding:11px 0;"><span style="font-size:14px;color:#E8EDF2;flex:1;min-width:0;">${it.name}</span><div style="text-align:right;flex-shrink:0;"><div class="item-kcal" style="font-size:14px;font-weight:500;color:${c?'#E8EDF2':'#5C6B7A'};">${c?fmt(c.kcal)+' kcal':''}</div><div class="item-protein" style="font-size:12px;color:#8B9BAD;margin-top:2px;">${c?c.protein+'g protein':''}</div></div></div>`; }).join('');
  const sidebarEmptyHTML=s.order.length===0?`<div style="flex:1;display:flex;align-items:center;justify-content:center;text-align:center;padding:0 10px;"><span style="font-size:13px;color:#5C6B7A;line-height:1.5;">Pick items on the left to build this meal.</span></div>`:'';
  const ctaEnabled=s.step===1?s.order.length>0:allConfirmed;
  const ctaLabel=s.step===1?'Continue':'Log meal';
  const ctaAction=s.step===1?'gotoStep2()':'logMeal()';

  let step2HTML='';
  if(s.step===2){ step2HTML=s.order.map(id=>{ const it=itemById(id); const sel=s.selected[id]; const p=sel.portion; return `<div style="background:#2A3A4A;border:1px solid #34465A;border-radius:14px;padding:16px 18px;"><div style="font-size:15px;font-weight:500;color:#E8EDF2;margin-bottom:14px;">${it.name}</div><div style="display:flex;gap:8px;"><button class="preset-btn${p==='whole'?' active':''}" onclick="setPortion('${id}','whole')">Whole</button><button class="preset-btn${p==='half'?' active':''}" onclick="setPortion('${id}','half')">Half</button><button class="preset-btn${p==='custom'?' active':''}" onclick="setPortion('${id}','custom')">Custom</button></div>${p==='custom'?`<div style="margin-top:12px;display:flex;align-items:center;gap:8px;"><input class="custom-g-input" type="text" inputmode="numeric" data-id="${id}" value="${sel.customG||''}" oninput="setCustomG('${id}',this.value)" placeholder="0"/><span style="font-size:14px;color:#8B9BAD;">grams</span></div>`:''}</div>`; }).join(''); }

  root.innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal-box">
    <div style="flex:1;min-width:0;display:flex;flex-direction:column;padding:28px 30px;">
      ${s.step===1?`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;"><span style="font-size:20px;font-weight:500;color:#E8EDF2;text-transform:capitalize;">Log ${slotLabel}</span><span style="font-size:13px;color:#8B9BAD;">1 / 2</span></div><div style="position:relative;margin-bottom:16px;"><div style="position:absolute;left:15px;top:50%;transform:translateY(-50%);">${iconSearch}</div><input class="search-input" type="text" value="${s.search}" oninput="setState({search:this.value})" placeholder="Search meals and ingredients…"/></div><div style="display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;margin-bottom:18px;">${tagsHTML}</div><div style="flex:1;min-height:0;overflow-y:auto;margin:0 -6px;padding:0 16px 0 6px;">${listHTML}</div>`:`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;"><div style="display:flex;align-items:center;gap:12px;"><div class="back-btn" onclick="gotoStep1()">${iconBack}</div><span style="font-size:20px;font-weight:500;color:#E8EDF2;">Confirm portions</span></div><span style="font-size:13px;color:#8B9BAD;">2 / 2</span></div><div style="flex:1;min-height:0;overflow-y:auto;margin:0 -6px;padding:0 6px;display:flex;flex-direction:column;gap:12px;">${step2HTML}</div>`}
    </div>
    <div style="width:320px;flex-shrink:0;border-left:1px solid #2A3A4A;background:#1A242F;display:flex;flex-direction:column;padding:28px 26px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;"><span style="font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:#8B9BAD;">Added</span><div class="close-btn" onclick="closeModal()">${iconClose}</div></div>
      <div style="flex:1;min-height:0;overflow-y:auto;display:flex;flex-direction:column;">${sidebarEmptyHTML}${addedItemsHTML}</div>
      <div style="border-top:1px solid #2A3A4A;margin-top:6px;padding-top:16px;">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px;"><span style="font-size:14px;color:#8B9BAD;">Total</span><div style="text-align:right;"><div id="sidebar-total-kcal" style="font-size:22px;font-weight:600;color:#E8EDF2;letter-spacing:-0.02em;">${fmt(totalK)} kcal</div><div id="sidebar-total-protein" style="font-size:13px;color:#8B9BAD;margin-top:2px;">${totalP}g protein</div></div></div>
        <button id="modal-cta" class="cta-btn ${ctaEnabled?'enabled':'disabled'}" ${ctaEnabled?`onclick="${ctaAction}"`:'disabled'}>${ctaLabel}</button>
      </div>
    </div>
  </div></div>`;

  const customInput=root.querySelector('.custom-g-input');
  if(customInput) customInput.focus();
}

function renderMain() {
  const s=state;
  let consumed=0,consumedProtein=0,loggedCount=0;
  SLOTS.forEach(k=>{ const m=s.loggedMeals[k]; if(m){ consumed+=m.kcal; consumedProtein+=m.protein; loggedCount++; } });
  const left=Math.max(0,GOAL_KCAL-consumed);
  const circ=439.8; const ringOff=Math.max(0,circ*(1-Math.min(1,consumed/GOAL_KCAL)));
  const proteinPct=Math.round(consumedProtein/GOAL_PROTEIN*100);
  const proteinBarW=Math.min(100,proteinPct);

  const slotsMeta=[['breakfast','Breakfast'],['lunch','Lunch'],['snack','Snack'],['dinner','Dinner']];
  const slotsHTML=slotsMeta.map(([key,label])=>{ const m=s.loggedMeals[key]; if(m){ return `<div style="margin-bottom:12px;"><div class="meal-card" style="background:#1C2733;border:1px solid #2A3A4A;border-radius:16px;padding:18px 20px;display:flex;align-items:center;gap:16px;"><div style="width:36px;height:36px;border-radius:10px;background:rgba(42,191,173,0.14);display:flex;align-items:center;justify-content:center;flex-shrink:0;">${iconCheck}</div><div style="flex:1;min-width:0;"><div style="font-size:12px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;color:#8B9BAD;margin-bottom:3px;">${label}</div><div style="font-size:16px;font-weight:500;color:#E8EDF2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${m.names.join(', ')}</div></div><div style="position:relative;flex-shrink:0;min-width:120px;display:flex;justify-content:flex-end;align-items:center;min-height:42px;"><div class="meal-stats" style="text-align:right;"><div style="font-size:22px;font-weight:600;color:#E8EDF2;letter-spacing:-0.02em;">${fmt(m.kcal)}</div><div style="font-size:12px;color:#8B9BAD;">kcal · ${m.protein}g protein</div></div><div class="meal-actions" style="position:absolute;right:0;top:50%;transform:translateY(-50%);display:flex;align-items:center;gap:2px;"><div class="meal-icon" onclick="openModal('${key}')">${iconEdit}</div><div class="meal-icon" onclick="deleteMeal('${key}')">${iconTrash}</div></div></div></div></div>`; } else { return `<div style="margin-bottom:12px;"><div class="empty-slot" onclick="openModal('${key}')"><div style="width:36px;height:36px;border-radius:10px;border:1.5px dashed #2A3A4A;display:flex;align-items:center;justify-content:center;flex-shrink:0;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#8B9BAD" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg></div><div style="flex:1;"><div style="font-size:12px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;color:#8B9BAD;margin-bottom:3px;">${label}</div><div style="font-size:16px;font-weight:500;color:#8B9BAD;">Log ${label.toLowerCase()}</div></div></div></div>`; } }).join('');

  document.getElementById('app').innerHTML=`
    <div style="min-height:100vh;background:#141B24;padding:36px 40px;display:flex;justify-content:center;">
      <div style="width:100%;max-width:1340px;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:30px;">
          <div style="display:flex;align-items:center;gap:32px;">
            <div style="font-family:'Instrument Serif',serif;font-size:30px;line-height:1;color:#E8EDF2;padding-right:6px;">portia</div>
            <div style="display:flex;align-items:center;gap:4px;background:#1C2733;border:1px solid #2A3A4A;border-radius:14px;padding:5px;">
              <div class="nav-tab active">${iconCalendar} Today</div>
              <a href="week.html" class="nav-tab">${iconWeek} Week</a>
              <div class="nav-tab">${iconRecipes} Recipes</div>
              <div class="nav-tab">${iconProgress} Progress</div>
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:8px;background:#1C2733;border:1px solid #2A3A4A;border-radius:12px;padding:8px 14px;">${iconStar}<span style="font-size:15px;font-weight:600;color:#E8B800;">7</span><span style="font-size:13px;color:#8B9BAD;">day streak</span></div>
        </div>
        <div style="display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:24px;">
          <div><div style="font-size:26px;font-weight:500;color:#E8EDF2;letter-spacing:-0.01em;">Good afternoon</div><div style="font-size:15px;color:#8B9BAD;margin-top:4px;">Monday · June 22</div></div>
          <button class="done-btn">Done for today</button>
        </div>
        <div style="display:grid;grid-template-columns:478px 1fr;gap:22px;">
          <div style="display:flex;flex-direction:column;gap:22px;">
            <div style="background:#1C2733;border:1px solid #2A3A4A;border-radius:20px;padding:34px 32px 30px;display:flex;flex-direction:column;align-items:center;">
              <div style="align-self:flex-start;font-size:12px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:#8B9BAD;margin-bottom:14px;">Calories</div>
              <div style="position:relative;width:248px;height:248px;">
                <svg width="248" height="248" viewBox="0 0 160 160" style="transform:rotate(-90deg);"><circle cx="80" cy="80" r="70" fill="none" stroke="#2A3A4A" stroke-width="11"/><circle cx="80" cy="80" r="70" fill="none" stroke="#2ABFAD" stroke-width="11" stroke-linecap="round" stroke-dasharray="439.8" stroke-dashoffset="${ringOff.toFixed(1)}" style="transition:stroke-dashoffset 1.2s cubic-bezier(0.22,1,0.36,1);"/></svg>
                <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;"><div style="font-size:66px;font-weight:600;line-height:0.95;color:#E8EDF2;letter-spacing:-0.03em;">${fmt(consumed)}</div><div style="font-size:16px;color:#8B9BAD;margin-top:6px;">/ 1,300 kcal</div></div>
              </div>
              <div style="margin-top:22px;font-size:15px;color:#8B9BAD;"><span style="color:#E8EDF2;font-weight:500;">${fmt(left)} kcal</span> left today</div>
            </div>
            <div style="background:#1C2733;border:1px solid #2A3A4A;border-radius:20px;padding:26px 28px;">
              <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:18px;"><span style="font-size:12px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:#8B9BAD;">Protein</span><span style="font-size:14px;color:#8B9BAD;">${proteinPct}%</span></div>
              <div style="display:flex;align-items:baseline;gap:8px;margin-bottom:16px;"><span style="font-size:48px;font-weight:600;line-height:0.9;color:#E8EDF2;letter-spacing:-0.03em;">${consumedProtein}</span><span style="font-size:22px;font-weight:500;color:#E8EDF2;">g</span><span style="font-size:16px;color:#8B9BAD;margin-left:4px;">/ 90g</span></div>
              <div style="height:8px;background:#2A3A4A;border-radius:5px;overflow:hidden;"><div style="height:100%;width:${proteinBarW}%;background:#2ABFAD;border-radius:5px;"></div></div>
            </div>
          </div>
          <div style="display:flex;flex-direction:column;">
            <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px;"><span style="font-size:16px;font-weight:600;color:#E8EDF2;">Meals</span><span style="font-size:13px;color:#8B9BAD;">${loggedCount} logged</span></div>
            ${slotsHTML}
            <div class="add-meal-row" onclick="openModal('snack')">${iconPlus} Add meal</div>
          </div>
        </div>
      </div>
    </div>`;
}

renderMain();
renderModal();
</script>
</body>
</html>
