<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Portia — Week</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Instrument+Serif&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #141B24; font-family: Inter, sans-serif; color: #E8EDF2; min-height: 100vh; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: #2A3A4A; border-radius: 4px; }
  input::placeholder { color: #6B7E91; }
  input, button { font-family: Inter, sans-serif; }

  .wk-grid { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 12px; }
  .mo-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
  @media (max-width: 720px) { .wk-grid { grid-template-columns: repeat(2, minmax(0,1fr)); } }

  .wk-meal { position: relative; }
  .wk-meal .wk-actions { opacity: 0; pointer-events: none; transition: opacity 0.15s; }
  .wk-meal:hover .wk-actions { opacity: 1; pointer-events: auto; }

  .meal-icon { cursor: pointer; color: #8B9BAD; transition: color 0.15s, transform 0.08s; width: 26px; height: 26px; border-radius: 6px; display: flex; align-items: center; justify-content: center; }
  .meal-icon:hover { color: #E8EDF2; }
  .meal-icon:active { transform: scale(0.9); }

  .nav-tab { display: flex; align-items: center; gap: 9px; padding: 9px 16px; border-radius: 10px; color: #8B9BAD; font-size: 14px; font-weight: 500; cursor: pointer; text-decoration: none; transition: background 0.15s, color 0.15s; }
  .nav-tab.active { background: #2A3A4A; color: #E8EDF2; }
  .nav-tab:hover:not(.active) { background: rgba(42,58,74,0.4); }

  .tag-chip { display: inline-flex; align-items: center; padding: 8px 14px; border-radius: 10px; font-size: 13px; font-weight: 500; cursor: pointer; white-space: nowrap; transition: background 0.15s, border-color 0.15s, color 0.15s; background: #2A3A4A; border: 1.5px solid #2A3A4A; color: #8B9BAD; }
  .tag-chip.active { border-color: #2ABFAD; color: #2ABFAD; }
  .tag-chip:hover { background: #233040; }

  .item-row { display: flex; align-items: center; gap: 14px; padding: 12px 8px; margin: 0 -6px; border-radius: 8px; border-bottom: 1px solid rgba(42,58,74,0.5); cursor: pointer; transition: background 0.15s; }
  .item-row:hover { background: #233040; }

  .counter-btn { width: 32px; height: 32px; border-radius: 9px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; border: 1.5px solid #2ABFAD; background: transparent; }
  .counter-btn.selected { background: #2ABFAD; border-color: #2ABFAD; }

  .preset-btn { flex: 1; text-align: center; padding: 9px 0; border-radius: 9px; font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid #34465A; color: #8B9BAD; background: transparent; transition: background 0.15s, border-color 0.15s, color 0.15s; }
  .preset-btn:hover { background: #233040; }
  .preset-btn.active { border-color: #2ABFAD; color: #2ABFAD; background: rgba(42,191,173,0.10); }

  .modal-overlay { position: fixed; inset: 0; background: rgba(10,14,20,0.72); display: flex; align-items: center; justify-content: center; padding: 40px; z-index: 50; }
  .modal-box { width: 100%; max-width: 1000px; height: 660px; max-height: 88vh; background: #1C2733; border: 1px solid #2A3A4A; border-radius: 24px; display: flex; overflow: hidden; box-shadow: 0 30px 80px rgba(0,0,0,0.55); }

  .search-input { width: 100%; background: #2A3A4A; border: 1.5px solid #2A3A4A; border-radius: 12px; padding: 13px 16px 13px 44px; font-size: 15px; color: #E8EDF2; outline: none; transition: border-color 0.15s; }
  .search-input:hover { border-color: #3D5166; }
  .search-input:focus { border-color: #2ABFAD; }

  .custom-g-input { width: 90px; background: #34465A; border: 1.5px solid #455A70; border-radius: 10px; padding: 9px 12px; font-size: 14px; color: #E8EDF2; outline: none; text-align: right; transition: border-color 0.15s; }
  .custom-g-input:hover { border-color: #3D5166; }
  .custom-g-input:focus { border-color: #2ABFAD; }

  .cta-btn { width: 100%; border: none; font-size: 15px; font-weight: 600; padding: 15px; border-radius: 13px; transition: background 0.15s, transform 0.08s; }
  .cta-btn.enabled { background: #E8B800; color: #141B24; cursor: pointer; }
  .cta-btn.enabled:hover { background: #C9A000; }
  .cta-btn.enabled:active { background: #C9A000; transform: scale(0.985); }
  .cta-btn.disabled { background: rgba(232,184,0,0.35); color: rgba(20,27,36,0.35); cursor: not-allowed; }

  .rand-btn { display: flex; align-items: center; gap: 9px; border: none; background: #E8B800; color: #141B24; font-size: 14px; font-weight: 600; padding: 12px 20px; border-radius: 12px; cursor: pointer; transition: background 0.15s, transform 0.08s; }
  .rand-btn:hover { background: #C9A000; }
  .rand-btn:active { background: #C9A000; transform: scale(0.985); }

  .seg-btn { padding: 7px 16px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; transition: background 0.15s, color 0.15s; color: #8B9BAD; }
  .seg-btn.active { background: #2A3A4A; color: #E8EDF2; }

  .chev-btn { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #E8EDF2; cursor: pointer; transition: background 0.15s; }
  .chev-btn:hover { background: #2A3A4A; }
  .chev-btn.disabled { color: #3D5166; cursor: not-allowed; }
  .chev-btn.disabled:hover { background: transparent; }

  .close-btn { width: 30px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #8B9BAD; transition: color 0.15s, transform 0.08s; }
  .close-btn:hover { color: #E8EDF2; }
  .close-btn:active { transform: scale(0.9); }

  .back-btn { width: 32px; height: 32px; border-radius: 9px; border: 1px solid #34465A; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #8B9BAD; transition: color 0.15s, transform 0.08s; }
  .back-btn:hover { color: #E8EDF2; }
  .back-btn:active { transform: scale(0.9); }

  .wk-slot-row { position: relative; display: flex; align-items: center; padding: 7px 9px; border-radius: 10px; transition: background 0.15s, border-color 0.15s; }
  .wk-slot-row.tappable:hover { border-color: #2ABFAD !important; background: #1A2430; }
</style>
</head>
<body>
<div id="app"></div>

<script>
// ─── DATA ───────────────────────────────────────────────────────────────────
const GOAL = 1300;
const TODAY = '2026-06-25';
const SLOTS = [['breakfast','Breakfast'],['lunch','Lunch'],['snack','Snack'],['dinner','Dinner']];
const DOW = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
const WD_HEADS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

const POOL = [
  {name:'Greek yogurt & berries', kcal:320, protein:24},
  {name:'Veggie omelette', kcal:300, protein:22},
  {name:'Oatmeal & banana', kcal:350, protein:12},
  {name:'Protein smoothie', kcal:280, protein:30},
  {name:'Chicken & quinoa bowl', kcal:540, protein:50},
  {name:'Turkey wrap', kcal:420, protein:32},
  {name:'Tuna salad', kcal:330, protein:34},
  {name:'Tofu stir-fry', kcal:410, protein:24},
  {name:'Salmon & sweet potato', kcal:480, protein:38},
  {name:'Steak & greens', kcal:560, protein:46},
  {name:'Cottage cheese & fruit', kcal:240, protein:26},
  {name:'Almonds & apple', kcal:220, protein:8},
];

const LIBRARY = [
  {id:'chicken', name:'Grilled chicken breast', tags:['High protein','Meat'], wholeG:200, kcal:330, protein:62},
  {id:'brownrice', name:'Brown rice', tags:['Grains','Vegetarian'], wholeG:150, kcal:180, protein:4},
  {id:'yogurt', name:'Greek yogurt', tags:['High protein','Dairy'], wholeG:170, kcal:100, protein:17},
  {id:'berries', name:'Mixed berries', tags:['Fruit','Vegetarian'], wholeG:100, kcal:50, protein:1},
  {id:'salmon', name:'Salmon fillet', tags:['High protein','Fish'], wholeG:150, kcal:280, protein:30},
  {id:'avocado', name:'Avocado', tags:['Healthy fats','Vegetarian'], wholeG:100, kcal:160, protein:2},
  {id:'quinoa', name:'Quinoa', tags:['Grains','Vegetarian'], wholeG:150, kcal:220, protein:8},
  {id:'eggs', name:'Boiled eggs', tags:['High protein'], wholeG:100, kcal:140, protein:13},
  {id:'almonds', name:'Almonds', tags:['Healthy fats','Snack'], wholeG:30, kcal:170, protein:6},
  {id:'banana', name:'Banana', tags:['Fruit','Snack'], wholeG:120, kcal:105, protein:1},
  {id:'cottage', name:'Cottage cheese', tags:['High protein','Dairy'], wholeG:150, kcal:130, protein:20},
  {id:'sweetpotato', name:'Sweet potato', tags:['Grains','Vegetarian'], wholeG:150, kcal:130, protein:3},
];
const ALL_TAGS = ['High protein','Vegetarian','Grains','Fruit','Dairy','Snack'];
const RECENTS = ['chicken','brownrice','yogurt'];
const FAVOURITES = ['salmon','avocado','eggs'];

const TODAY_MEALS = {
  breakfast:{name:'Greek yogurt & berries', kcal:320, protein:24, logged:true},
  lunch:{name:'Chicken & quinoa bowl', kcal:540, protein:50, logged:true},
  snack:{name:'Almonds & apple', kcal:220, protein:8, logged:false},
  dinner:{name:'Salmon & sweet potato', kcal:480, protein:38, logged:false},
};

// ─── STATE ──────────────────────────────────────────────────────────────────
let state = {
  view: 'week',
  weekOffset: 0,
  monthOffset: 0,
  planned: {
    '2026-06-26': { breakfast:{name:'Oatmeal & banana',kcal:350,protein:12}, lunch:{name:'Turkey wrap',kcal:420,protein:32}, snack:{name:'Cottage cheese & fruit',kcal:240,protein:26}, dinner:{name:'Steak & greens',kcal:560,protein:46} },
    '2026-06-27': { breakfast:{name:'Protein smoothie',kcal:280,protein:30}, lunch:{name:'Chicken & quinoa bowl',kcal:540,protein:50}, snack:null, dinner:null },
    '2026-06-28': { breakfast:null, lunch:null, snack:null, dinner:null },
  },
  modalKey: null, modalSlot: null, step: 1, search: '', activeTags: [], selected: {}, order: [],
};

function setState(patch) {
  if (typeof patch === 'function') state = { ...state, ...patch(state) };
  else state = { ...state, ...patch };
  render();
}

// ─── HELPERS ────────────────────────────────────────────────────────────────
const fmt = n => n.toLocaleString('en-US');
const pad = n => String(n).padStart(2,'0');
const key = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const addDays = (d,n) => { const x=new Date(d); x.setDate(x.getDate()+n); return x; };
const monday = off => addDays(new Date(2026,5,22), off*7);
const status = k => k < TODAY ? 'past' : (k === TODAY ? 'today' : 'future');
const mShort = d => d.toLocaleString('en-US',{month:'short'});
const itemById = id => LIBRARY.find(i => i.id === id);
function isConfirmed(sel) { if(!sel||!sel.portion) return false; if(sel.portion==='custom') return Number(sel.customG)>0; return true; }
function calc(it,sel) { if(!isConfirmed(sel)) return null; const f=sel.portion==='whole'?1:sel.portion==='half'?0.5:(Number(sel.customG)/it.wholeG); return { kcal:Math.round(it.kcal*f), protein:Math.round(it.protein*f) }; }

function hash(s) { let h=2166136261; for(let i=0;i<s.length;i++){ h^=s.charCodeAt(i); h=Math.imul(h,16777619); } return h>>>0; }
function rngFor(s) { let a=hash(s); return ()=>{ a|=0; a=a+0x6D2B79F5|0; let t=Math.imul(a^a>>>15,1|a); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }
function pastMeals(k) { const r=rngFor(k); const out={}; let prev=-1; SLOTS.forEach(([sk])=>{ let idx; do{ idx=Math.floor(r()*POOL.length); }while(idx===prev); prev=idx; out[sk]={...POOL[idx], logged:true}; }); return out; }
function mealsFor(k) { const st=status(k); if(st==='past') return pastMeals(k); if(st==='today') return TODAY_MEALS; return state.planned[k] || {breakfast:null,lunch:null,snack:null,dinner:null}; }
function consumed(meals) { let c=0; SLOTS.forEach(([sk])=>{ const m=meals[sk]; if(m&&m.logged!==false) c+=m.kcal; }); return c; }

// ─── ACTIONS ────────────────────────────────────────────────────────────────
function prevWeek() { setState(s => ({ weekOffset: s.weekOffset-1 })); }
function nextWeek() { setState(s => s.weekOffset<2 ? { weekOffset: s.weekOffset+1 } : {}); }
function prevMonth() { setState(s => ({ monthOffset: s.monthOffset-1 })); }
function nextMonth() { setState(s => ({ monthOffset: s.monthOffset+1 })); }
function setView(v) { setState({ view:v }); }

function randomize() {
  const off = state.weekOffset;
  if (off < 0) return;
  setState(s => {
    const planned = { ...s.planned };
    const mon = monday(off);
    let prevNames = [];
    for (let i=0;i<7;i++) {
      const d=addDays(mon,i); const k=key(d); const st=status(k);
      if (st !== 'future') { const meals=mealsFor(k); prevNames=SLOTS.map(([sk])=>meals[sk]&&meals[sk].name).filter(Boolean); continue; }
      const day={...(planned[k]||{breakfast:null,lunch:null,snack:null,dinner:null})};
      const r=rngFor('rnd-'+k+'-'+Date.now()+'-'+Math.random());
      const used=[];
      SLOTS.forEach(([sk])=>{
        if(day[sk]){ used.push(day[sk].name); return; }
        let pick, guard=0;
        do { pick=POOL[Math.floor(r()*POOL.length)]; guard++; } while(guard<60 && (prevNames.includes(pick.name)||used.includes(pick.name)));
        day[sk]={...pick}; used.push(pick.name);
      });
      planned[k]=day; prevNames=used;
    }
    return { planned };
  });
}

function openPicker(k, slot) {
  const existing=(state.planned[k]||{})[slot];
  let selected={}, order=[];
  if(existing){ const it=LIBRARY.find(i=>i.name===existing.name); if(it){ selected[it.id]={portion:'whole',customG:''}; order=[it.id]; } }
  setState({ modalKey:k, modalSlot:slot, step:1, search:'', activeTags:[], selected, order });
}
function closeModal() { setState({ modalKey:null, modalSlot:null }); }
function removePlanned(k,sk) {
  setState(s=>{ const day={...(s.planned[k]||{breakfast:null,lunch:null,snack:null,dinner:null})}; day[sk]=null; return { planned:{...s.planned,[k]:day} }; });
}
function toggleItem(id) {
  setState(s=>{ const selected={...s.selected}; let order=[...s.order]; if(selected[id]){ delete selected[id]; order=order.filter(x=>x!==id); } else { selected[id]={portion:null,customG:''}; order=[...order,id]; } return { selected, order }; });
}
function toggleTag(t) { setState(s=>({ activeTags: s.activeTags.includes(t)?s.activeTags.filter(x=>x!==t):[...s.activeTags,t] })); }
function setPortion(id,p) { setState(s=>({ selected:{...s.selected,[id]:{...s.selected[id],portion:p}} })); }
function setCustomG(id,v) { const clean=String(v).replace(/[^0-9]/g,''); setState(s=>({ selected:{...s.selected,[id]:{...s.selected[id],portion:'custom',customG:clean}} })); }
function gotoStep2() { setState({ step:2 }); }
function gotoStep1() { setState(s=>{ const selected={}; for(const id of s.order) selected[id]={portion:null,customG:''}; return { step:1, selected }; }); }
function savePlan() {
  setState(s=>{
    let names=[],kcal=0,protein=0;
    for(const id of s.order){ const it=itemById(id); const c=calc(it,s.selected[id]); names.push(it.name); kcal+=c.kcal; protein+=c.protein; }
    const day={...(s.planned[s.modalKey]||{breakfast:null,lunch:null,snack:null,dinner:null})};
    day[s.modalSlot]={name:names.join(', '),kcal,protein};
    return { planned:{...s.planned,[s.modalKey]:day}, modalKey:null, modalSlot:null };
  });
}

// ─── SVG ICONS ──────────────────────────────────────────────────────────────
const iconCalendar = `<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3.5" y="4.5" width="17" height="16" rx="2.5"/><path d="M3.5 9h17M8 2.5v4M16 2.5v4"/></svg>`;
const iconWeek = `<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3.5" y="3.5" width="7" height="7" rx="1.5"/><rect x="13.5" y="3.5" width="7" height="7" rx="1.5"/><rect x="3.5" y="13.5" width="7" height="7" rx="1.5"/><rect x="13.5" y="13.5" width="7" height="7" rx="1.5"/></svg>`;
const iconRecipes = `<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3.5h12v17l-6-4-6 4z"/></svg>`;
const iconProgress = `<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19V5M4 19h16"/><path d="M7 15l3.5-4 3 2.5L20 7"/></svg>`;
const iconStar = `<svg width="16" height="16" viewBox="0 0 24 24" fill="#E8B800" stroke="none"><path d="M12 3l2.6 6.1 6.4.5-4.9 4.2 1.5 6.4L12 16.9 6.9 20.7l1.5-6.4L3.5 9.6l6.4-.5z"/></svg>`;
const iconStarSm = `<svg width="15" height="15" viewBox="0 0 24 24" fill="#E8B800" stroke="none"><path d="M12 3l2.6 6.1 6.4.5-4.9 4.2 1.5 6.4L12 16.9 6.9 20.7l1.5-6.4L3.5 9.6l6.4-.5z"/></svg>`;
const iconSearch = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#8B9BAD" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>`;
const iconClose = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>`;
const iconBack = `<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>`;
const iconChevL = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>`;
const iconChevR = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>`;
const iconShuffle = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M16 3h5v5"/><path d="M21 3l-7 7"/><path d="M8 21H3v-5"/><path d="M3 21l7-7"/><path d="M3 8V3h5"/><path d="M16 21h5v-5"/></svg>`;
const iconEdit = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>`;
const iconTrash = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg>`;
const iconCheckTeal = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#2ABFAD" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>`;
const iconDot = `<svg width="9" height="9" viewBox="0 0 24 24" fill="#6B7E91" stroke="none"><circle cx="12" cy="12" r="6"/></svg>`;
const iconPlusGray = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#6B7E91" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>`;
const iconCheckW = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>`;
const iconPlusTeal = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#2ABFAD" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>`;
const iconPlus = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>`;

// ─── DAY CARD BUILDER ───────────────────────────────────────────────────────
function buildDayCard(k, d) {
  const st = status(k);
  const meals = mealsFor(k);
  const editable = st === 'future';
  const isToday = k === TODAY;
  const con = consumed(meals);
  const hasKcal = st === 'past' || st === 'today';
  const star = st === 'past' && con <= GOAL;

  let cardStyle = 'border-radius:16px;padding:16px 15px;';
  cardStyle += isToday ? 'background:#2A3A4A;border:1px solid #34465A;' : 'background:#1C2733;border:1px solid #2A3A4A;';

  const numColor = isToday ? '#2ABFAD' : '#E8EDF2';

  const slotsHTML = SLOTS.map(([sk,label]) => {
    const m = meals[sk];
    const isLogged = !editable && !!(m && m.logged !== false);
    const isPlanned = !!m && !isLogged;
    const isEmpty = !m;
    const tappable = editable && (isPlanned || isEmpty);

    let rowBorder = isLogged ? 'border:1px solid transparent;' : isPlanned ? 'border:1px dashed #3A4C5E;' : 'border:1px dashed #2A3A4A;';
    let iconBg = isLogged ? 'background:rgba(42,191,173,0.14);' : isPlanned ? 'border:1px solid #3D5166;' : 'border:1px dashed #3A4C5E;';
    let nameColor = (isLogged || isPlanned) ? '#E8EDF2' : '#6B7E91';
    let icon = isLogged ? iconCheckTeal : isPlanned ? iconDot : iconPlusGray;
    let name = m ? m.name : `Add ${label.toLowerCase()}`;

    const tapAttr = tappable ? `onclick="openPicker('${k}','${sk}')" style="cursor:pointer;"` : '';
    const actionsHTML = editable && isPlanned ? `
      <div class="wk-actions" style="position:absolute;right:6px;top:50%;transform:translateY(-50%);display:flex;align-items:center;gap:1px;padding-left:14px;border-radius:6px;background:#1A2430;box-shadow:-10px 0 10px 4px #1A2430;">
        <div class="meal-icon" onclick="openPicker('${k}','${sk}')" title="Edit">${iconEdit}</div>
        <div class="meal-icon" onclick="removePlanned('${k}','${sk}')" title="Remove">${iconTrash}</div>
      </div>` : '';

    return `
      <div class="wk-meal wk-slot-row${tappable ? ' tappable' : ''}" style="${rowBorder}">
        <div ${tapAttr} style="display:flex;align-items:center;gap:9px;flex:1;min-width:0;">
          <div style="width:22px;height:22px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;${iconBg}">${icon}</div>
          <div style="min-width:0;flex:1;">
            <div style="font-size:9px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:#6B7E91;margin-bottom:1px;">${label}</div>
            <div style="font-size:12.5px;font-weight:500;line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:${nameColor};">${name}</div>
          </div>
        </div>
        ${actionsHTML}
      </div>`;
  }).join('');

  return `
    <div style="${cardStyle}">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;">
        <div style="display:flex;align-items:baseline;gap:7px;">
          <span style="font-size:11px;font-weight:600;letter-spacing:0.07em;color:#8B9BAD;">${DOW[d.getDay()]}</span>
          <span style="font-size:18px;font-weight:600;letter-spacing:-0.01em;color:${numColor};">${d.getDate()}</span>
        </div>
        <div style="display:flex;align-items:center;gap:6px;min-height:18px;">
          ${star ? iconStarSm : ''}
          ${isToday ? '<span style="font-size:10px;font-weight:600;letter-spacing:0.04em;color:#2ABFAD;background:rgba(42,191,173,0.13);padding:3px 7px;border-radius:6px;">TODAY</span>' : ''}
        </div>
      </div>
      ${hasKcal ? `<div style="font-size:11px;color:#8B9BAD;margin-top:-6px;margin-bottom:11px;">${con.toLocaleString('en-US')} / 1,300 kcal</div>` : ''}
      <div style="display:flex;flex-direction:column;gap:6px;">${slotsHTML}</div>
    </div>`;
}

// ─── MONTH CELLS ────────────────────────────────────────────────────────────
function buildMonthCells() {
  const base = new Date(2026, 5 + state.monthOffset, 1);
  const y = base.getFullYear(), m = base.getMonth();
  const startDow = (base.getDay() + 6) % 7;
  const dim = new Date(y, m+1, 0).getDate();
  let html = '';
  for (let i=0;i<startDow;i++) html += `<div style="min-height:82px;"></div>`;
  for (let dn=1;dn<=dim;dn++) {
    const d=new Date(y,m,dn); const k=key(d); const st=status(k); const isToday=k===TODAY;
    let star=false, kcalText='', hasKcal=false;
    if(st==='past'){ const meals=pastMeals(k); let c=0; SLOTS.forEach(([sk])=>c+=meals[sk].kcal); star=c<=GOAL; kcalText=`${c.toLocaleString('en-US')} / 1,300`; hasKcal=true; }
    else if(st==='today'){ const c=consumed(TODAY_MEALS); kcalText=`${c.toLocaleString('en-US')} / 1,300`; hasKcal=true; }
    const cellStyle = 'border-radius:12px;padding:9px 10px;min-height:82px;display:flex;flex-direction:column;justify-content:space-between;' + (isToday ? 'background:#2A3A4A;border:1px solid #34465A;' : 'background:#1C2733;border:1px solid #2A3A4A;');
    const numColor = isToday ? '#2ABFAD' : (st==='future' ? '#5C6B7A' : '#E8EDF2');
    html += `<div style="${cellStyle}"><div style="display:flex;align-items:flex-start;justify-content:space-between;"><span style="font-size:14px;font-weight:600;color:${numColor};">${dn}</span>${star?`<svg width="14" height="14" viewBox="0 0 24 24" fill="#E8B800" stroke="none"><path d="M12 3l2.6 6.1 6.4.5-4.9 4.2 1.5 6.4L12 16.9 6.9 20.7l1.5-6.4L3.5 9.6l6.4-.5z"/></svg>`:''}</div>${hasKcal?`<div style="font-size:11px;color:#8B9BAD;">${kcalText}</div>`:''}</div>`;
  }
  while((dim+startDow)%7!==0) { html += `<div style="min-height:82px;"></div>`; }
  return html;
}

// ─── ITEM ROW ───────────────────────────────────────────────────────────────
function renderItemRow(it, isSelected) {
  return `
    <div class="item-row" onclick="toggleItem('${it.id}')">
      <div style="flex:1;min-width:0;">
        <div style="font-size:15px;font-weight:500;color:#E8EDF2;">${it.name}</div>
        <div style="font-size:12px;color:#8B9BAD;margin-top:2px;">${it.tags.join(' · ')}</div>
      </div>
      <div style="text-align:right;flex-shrink:0;">
        <div style="font-size:14px;font-weight:500;color:#E8EDF2;">${it.kcal} kcal</div>
        <div style="font-size:12px;color:#8B9BAD;">${it.protein}g protein</div>
      </div>
      <div class="counter-btn${isSelected?' selected':''}">
        ${isSelected ? iconCheckW : iconPlusTeal}
      </div>
    </div>`;
}

// ─── RENDER ─────────────────────────────────────────────────────────────────
function render() {
  const s = state;
  const isWeek = s.view === 'week', isMonth = s.view === 'month';

  // header
  let headerLabel, headerTag;
  if (isWeek) {
    const mon=monday(s.weekOffset), sun=addDays(mon,6);
    const sameM=mon.getMonth()===sun.getMonth();
    headerLabel = `${mShort(mon)} ${mon.getDate()} – ${sameM?'':mShort(sun)+' '}${sun.getDate()}`;
    headerTag = s.weekOffset===0?'This week':s.weekOffset===-1?'Last week':s.weekOffset===1?'Next week':s.weekOffset<0?`${-s.weekOffset} weeks ago`:`In ${s.weekOffset} weeks`;
  } else {
    const base=new Date(2026,5+s.monthOffset,1);
    headerLabel = base.toLocaleString('en-US',{month:'long',year:'numeric'});
    headerTag = s.monthOffset===0?'This month':s.monthOffset===-1?'Last month':s.monthOffset===1?'Next month':s.monthOffset<0?`${-s.monthOffset} months ago`:`In ${s.monthOffset} months`;
  }

  const atMax = isWeek && s.weekOffset >= 2;

  // week grid
  let mainHTML = '';
  if (isWeek) {
    const mon = monday(s.weekOffset);
    const cards = [0,1,2,3,4,5,6].map(i => { const d=addDays(mon,i); return buildDayCard(key(d),d); }).join('');
    mainHTML = `<div class="wk-grid">${cards}</div>`;
  } else {
    const heads = WD_HEADS.map(h => `<div style="font-size:11px;font-weight:600;letter-spacing:0.07em;color:#6B7E91;text-align:center;padding:2px 0;">${h}</div>`).join('');
    mainHTML = `<div><div class="mo-grid" style="margin-bottom:10px;">${heads}</div><div class="mo-grid">${buildMonthCells()}</div></div>`;
  }

  // modal
  let modalHTML = '';
  if (s.modalKey) {
    const slotLabel = (SLOTS.find(([k]) => k===s.modalSlot)||[null,''])[1];
    const q = s.search.trim().toLowerCase();
    const matches = it => (!q||it.name.toLowerCase().includes(q))&&(s.activeTags.length===0||it.tags.some(t=>s.activeTags.includes(t)));
    const showSections = !q && s.activeTags.length === 0;
    const filtered = LIBRARY.filter(matches);
    const tagsHTML = ALL_TAGS.map(t => `<div class="tag-chip${s.activeTags.includes(t)?' active':''}" onclick="toggleTag('${t}')">${t}</div>`).join('');

    let listHTML = '';
    if (showSections) {
      listHTML = `<div style="font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:#8B9BAD;margin:4px 0 6px;">Recents</div>${RECENTS.map(id=>renderItemRow(itemById(id),!!s.selected[id])).join('')}<div style="font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:#8B9BAD;margin:18px 0 6px;">Favourites</div>${FAVOURITES.map(id=>renderItemRow(itemById(id),!!s.selected[id])).join('')}`;
    } else if (filtered.length > 0) {
      listHTML = filtered.map(it=>renderItemRow(it,!!s.selected[it.id])).join('');
    } else {
      listHTML = `<div style="padding:40px 8px;text-align:center;"><div style="font-size:15px;color:#8B9BAD;margin-bottom:10px;">Nothing found. Add it to your library instead.</div><div style="display:inline-flex;align-items:center;gap:6px;color:#E8B800;font-size:14px;font-weight:500;cursor:pointer;">${iconPlus} Add new item</div></div>`;
    }

    let totalK=0, totalP=0, allConfirmed=s.order.length>0;
    const addedItemsHTML = s.order.map(id=>{
      const it=itemById(id); const c=calc(it,s.selected[id]);
      if(c){ totalK+=c.kcal; totalP+=c.protein; } else { allConfirmed=false; }
      return `<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;padding:11px 0;"><span style="font-size:14px;color:#E8EDF2;flex:1;min-width:0;">${it.name}</span><div style="text-align:right;flex-shrink:0;"><div style="font-size:14px;font-weight:500;color:${c?'#E8EDF2':'#5C6B7A'};">${c?fmt(c.kcal)+' kcal':''}</div><div style="font-size:12px;color:#8B9BAD;margin-top:2px;">${c?c.protein+'g protein':''}</div></div></div>`;
    }).join('');

    const sidebarEmptyHTML = s.order.length===0 ? `<div style="flex:1;display:flex;align-items:center;justify-content:center;text-align:center;padding:0 10px;"><span style="font-size:13px;color:#5C6B7A;line-height:1.5;">Pick items on the left to build this meal.</span></div>` : '';

    const ctaEnabled = s.step===1 ? s.order.length>0 : allConfirmed;
    const ctaLabel = s.step===1 ? 'Continue' : 'Save to plan';
    const ctaAction = s.step===1 ? 'gotoStep2()' : 'savePlan()';

    let step2HTML = '';
    if (s.step === 2) {
      step2HTML = s.order.map(id=>{
        const it=itemById(id); const sel=s.selected[id]; const p=sel.portion;
        return `<div style="background:#2A3A4A;border:1px solid #34465A;border-radius:14px;padding:16px 18px;"><div style="font-size:15px;font-weight:500;color:#E8EDF2;margin-bottom:14px;">${it.name}</div><div style="display:flex;gap:8px;"><button class="preset-btn${p==='whole'?' active':''}" onclick="setPortion('${id}','whole')">Whole</button><button class="preset-btn${p==='half'?' active':''}" onclick="setPortion('${id}','half')">Half</button><button class="preset-btn${p==='custom'?' active':''}" onclick="setPortion('${id}','custom')">Custom</button></div>${p==='custom'?`<div style="margin-top:12px;display:flex;align-items:center;gap:8px;"><input class="custom-g-input" type="text" value="${sel.customG}" oninput="setCustomG('${id}',this.value)" placeholder="0"/><span style="font-size:14px;color:#8B9BAD;">grams</span></div>`:''}</div>`;
      }).join('');
    }

    modalHTML = `
      <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
        <div class="modal-box">
          <div style="flex:1;min-width:0;display:flex;flex-direction:column;padding:28px 30px;">
            ${s.step===1 ? `
              <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
                <span style="font-size:20px;font-weight:500;color:#E8EDF2;">Plan ${slotLabel}</span>
                <span style="font-size:13px;color:#8B9BAD;">1 / 2</span>
              </div>
              <div style="position:relative;margin-bottom:16px;"><div style="position:absolute;left:15px;top:50%;transform:translateY(-50%);">${iconSearch}</div><input class="search-input" type="text" value="${s.search}" oninput="setState({search:this.value})" placeholder="Search meals and ingredients…"/></div>
              <div style="display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;margin-bottom:18px;">${tagsHTML}</div>
              <div style="flex:1;min-height:0;overflow-y:auto;margin:0 -6px;padding:0 16px 0 6px;">${listHTML}</div>
            ` : `
              <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
                <div style="display:flex;align-items:center;gap:12px;"><div class="back-btn" onclick="gotoStep1()">${iconBack}</div><span style="font-size:20px;font-weight:500;color:#E8EDF2;">Confirm portions</span></div>
                <span style="font-size:13px;color:#8B9BAD;">2 / 2</span>
              </div>
              <div style="flex:1;min-height:0;overflow-y:auto;margin:0 -6px;padding:0 6px;display:flex;flex-direction:column;gap:12px;">${step2HTML}</div>
            `}
          </div>
          <div style="width:320px;flex-shrink:0;border-left:1px solid #2A3A4A;background:#1A242F;display:flex;flex-direction:column;padding:28px 26px;">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;">
              <span style="font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:#8B9BAD;">Added</span>
              <div class="close-btn" onclick="closeModal()">${iconClose}</div>
            </div>
            <div style="flex:1;min-height:0;overflow-y:auto;display:flex;flex-direction:column;">${sidebarEmptyHTML}${addedItemsHTML}</div>
            <div style="border-top:1px solid #2A3A4A;margin-top:6px;padding-top:16px;">
              <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px;">
                <span style="font-size:14px;color:#8B9BAD;">Total</span>
                <div style="text-align:right;"><div style="font-size:22px;font-weight:600;color:#E8EDF2;letter-spacing:-0.02em;">${fmt(totalK)} kcal</div><div style="font-size:13px;color:#8B9BAD;margin-top:2px;">${totalP}g protein</div></div>
              </div>
              <button class="cta-btn ${ctaEnabled?'enabled':'disabled'}" ${ctaEnabled?`onclick="${ctaAction}"`:'disabled'}>${ctaLabel}</button>
            </div>
          </div>
        </div>
      </div>`;
  }

  document.getElementById('app').innerHTML = `
    <div style="min-height:100vh;background:#141B24;padding:36px 40px;display:flex;justify-content:center;">
      <div style="width:100%;max-width:1340px;">

        <!-- NAV -->
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:30px;">
          <div style="display:flex;align-items:center;gap:32px;">
            <div style="font-family:'Instrument Serif',serif;font-size:30px;line-height:1;color:#E8EDF2;padding-right:6px;">portia</div>
            <div style="display:flex;align-items:center;gap:4px;background:#1C2733;border:1px solid #2A3A4A;border-radius:14px;padding:5px;">
              <a href="today.html" class="nav-tab">${iconCalendar} Today</a>
              <div class="nav-tab active">${iconWeek} Week</div>
              <div class="nav-tab">${iconRecipes} Recipes</div>
              <div class="nav-tab">${iconProgress} Progress</div>
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:8px;background:#1C2733;border:1px solid #2A3A4A;border-radius:12px;padding:8px 14px;">
            ${iconStar}<span style="font-size:15px;font-weight:600;color:#E8B800;">7</span><span style="font-size:13px;color:#8B9BAD;">day streak</span>
          </div>
        </div>

        <!-- HEADER ROW -->
        <div style="display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:24px;gap:20px;flex-wrap:wrap;">
          <div>
            <div style="display:flex;align-items:center;gap:14px;">
              <div style="font-size:26px;font-weight:500;color:#E8EDF2;letter-spacing:-0.01em;">${headerLabel}</div>
              <div style="font-size:12px;font-weight:500;color:#8B9BAD;background:#1C2733;border:1px solid #2A3A4A;padding:5px 11px;border-radius:8px;">${headerTag}</div>
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:10px;">
            ${isWeek && s.weekOffset >= 0 ? `<button class="rand-btn" onclick="randomize()">${iconShuffle} Randomize meals</button>` : ''}
            <div style="display:flex;align-items:center;gap:4px;background:#1C2733;border:1px solid #2A3A4A;border-radius:11px;padding:4px;">
              <div class="chev-btn" onclick="${isWeek?'prevWeek()':'prevMonth()'}">
                ${iconChevL}
              </div>
              <div class="chev-btn${atMax?' disabled':''}" onclick="${atMax?'':isWeek?'nextWeek()':'nextMonth()'}">
                ${iconChevR}
              </div>
            </div>
            <div style="display:flex;align-items:center;gap:3px;background:#1C2733;border:1px solid #2A3A4A;border-radius:11px;padding:4px;">
              <div class="seg-btn${isWeek?' active':''}" onclick="setView('week')">Week</div>
              <div class="seg-btn${isMonth?' active':''}" onclick="setView('month')">Month</div>
            </div>
          </div>
        </div>

        ${mainHTML}
      </div>
    </div>
    ${modalHTML}`;
}

render();
</script>
</body>
</html>
